    <style>
        .memo-container { max-width: 600px; margin: 2rem auto; padding: 1rem; }
        .memo-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0.5rem 1rem; margin-bottom: 0.5rem; background: #f9f9f9; border-radius: 8px;
        }
        .memo-text { flex-grow: 1; margin-right: 1rem; }

        <a href="index.html" class="nav-link">⬅️ 메인으로 돌아가기</a>
        
        <header>
            <h1>📝 개인 메모장</h1>
            <p>브라우저에 저장되는 간단한 메모입니다.</p>
        </header>

        <section>
            <form id="memo-form">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="memo-input" placeholder="새로운 메모를 입력하세요..." required>
                    <button type="submit" style="width: 120px;">추가</button>
                </div>
            </form>
        </section>

        <section id="memo-list">
            </section>
    </main>

    <script>
        const memoForm = document.getElementById('memo-form');
        const memoInput = document.getElementById('memo-input');
        const memoList = document.getElementById('memo-list');

        // 1. 초기 로드 시 저장된 메모 불러오기
        document.addEventListener('DOMContentLoaded', displayMemos);

        // 2. 메모 추가 기능
        memoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const memoText = memoInput.value;
            saveMemo(memoText);
            memoInput.value = '';
            displayMemos();
        });

        // 3. LocalStorage에 저장
        function saveMemo(memo) {
            let memos = JSON.parse(localStorage.getItem('myMemos') || '[]');
            memos.push(memo);
            localStorage.setItem('myMemos', JSON.stringify(memos));
        }

        // 4. 화면에 메모 목록 표시
        function displayMemos() {
            let memos = JSON.parse(localStorage.getItem('myMemos') || '[]');
            memoList.innerHTML = memos.map((memo, index) => `
                <div class="memo-item">
                    <span class="memo-text">${memo}</span>
                    <button class="delete-btn" onclick="deleteMemo(${index})">삭제</button>
                </div>
            `).join('');
        }

        // 5. 메모 삭제 기능
        window.deleteMemo = function(index) {
            let memos = JSON.parse(localStorage.getItem('myMemos') || '[]');
            memos.splice(index, 1);
            localStorage.setItem('myMemos', JSON.stringify(memos));
            displayMemos();
        }
    </script>
</body>
