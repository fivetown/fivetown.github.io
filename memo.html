<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 메모장</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        .memo-container { max-width: 600px; margin: 2rem auto; padding: 1rem; }
        .memo-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0.5rem 1rem; margin-bottom: 0.5rem; background: #f9f9f9; border-radius: 8px;
        }
        .memo-text { flex-grow: 1; margin-right: 1rem; white-space: pre-wrap; }
        button.delete-btn { width: auto; padding: 0.2rem 0.6rem; margin-bottom: 0; background: #e53935; border: none; }
    </style>
</head>
<body>
    <main class="container memo-container">
        <a href="index.html">⬅️ 메인으로 돌아가기</a>
        <header>
            <h1>📝 개인 메모장</h1>
            <p>브라우저 LocalStorage를 사용합니다.</p>
        </header>

        <form id="memo-form">
            <input type="text" id="memo-input" placeholder="메모를 입력하세요..." required>
            <button type="submit">추가하기</button>
        </form>

        <div id="memo-list"></div>
    </main>

    <script>
        const memoForm = document.getElementById('memo-form');
        const memoInput = document.getElementById('memo-input');
        const memoList = document.getElementById('memo-list');

        document.addEventListener('DOMContentLoaded', displayMemos);

        memoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            saveMemo(memoInput.value);
            memoInput.value = '';
            displayMemos();
        });

        function saveMemo(memo) {
            let memos = JSON.parse(localStorage.getItem('myMemos') || '[]');
            memos.push(memo);
            localStorage.setItem('myMemos', JSON.stringify(memos));
        }

        function displayMemos() {
            let memos = JSON.parse(localStorage.getItem('myMemos') || '[]');
            memoList.innerHTML = ''; // 초기화
            
            memos.forEach((memo, index) => {
                const item = document.createElement('div');
                item.className = 'memo-item';
                
                const span = document.createElement('span');
                span.className = 'memo-text';
                span.textContent = memo; // XSS 방지: textContent 사용
                
                const btn = document.createElement('button');
                btn.className = 'delete-btn';
                btn.textContent = '삭제';
                btn.onclick = () => deleteMemo(index);
                
                item.appendChild(span);
                item.appendChild(btn);
                memoList.appendChild(item);
            });
        }

        window.deleteMemo = function(index) {
            let memos = JSON.parse(localStorage.getItem('myMemos') || '[]');
            memos.splice(index, 1);
            localStorage.setItem('myMemos', JSON.stringify(memos));
            displayMemos();
        }
    </script>
</body>
</html>
