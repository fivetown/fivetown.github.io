<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .board-container { max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .post-card { padding: 1.5rem; margin-bottom: 1rem; border-radius: 8px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; border-bottom: 1px solid #f0f0f0; padding-bottom: 0.5rem; }
        .post-author { font-weight: bold; }
        .post-date { font-size: 0.8rem; color: #888; }
        .post-content { white-space: pre-wrap; margin: 10px 0; }
    </style>
</head>
<body>
    <main class="container board-container">
        <a href="index.html">⬅️ 메인으로 돌아가기</a>
        <header>
            <h1>📋 자유 게시판</h1>
        </header>

        <section id="write-section">
            <form id="post-form">
                <input type="text" id="author" placeholder="작성자 이름" required>
                <textarea id="content" placeholder="내용을 입력하세요" rows="3" required></textarea>
                <button type="submit" id="submit-btn">게시글 등록</button>
            </form>
        </section>

        <hr>
        <div id="post-list">
            <p aria-busy="true">데이터를 불러오는 중...</p>
        </div>
    </main>

    <script>
        // Supabase 설정 (본인의 정보로 유지)
        const SUPABASE_URL = 'https://celuomuboxcwkqjawnzk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlbHVvbXVib3hjd2txamF3bnprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjg4MDksImV4cCI6MjA4ODg0NDgwOX0.bBtFB5wk8JsE5cgBno7PfJeZHHvhP3XFXkSKM7r7SZw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const postForm = document.getElementById('post-form');
        const postList = document.getElementById('post-list');

        // 1. 게시글 가져오기
        async function fetchPosts() {
            try {
                const { data, error } = await supabase
                    .from('posts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                displayPosts(data);
            } catch (error) {
                postList.innerHTML = `<p style="color:red">오류 발생: ${error.message}</p>`;
            }
        }

        // 2. 화면에 표시 (보안 적용)
        function displayPosts(posts) {
            if (!posts || posts.length === 0) {
                postList.innerHTML = '<p>등록된 게시글이 없습니다.</p>';
                return;
            }

            postList.innerHTML = posts.map(post => {
                // XSS 방지를 위한 치환
                const safeAuthor = post.author.replace(/</g, "&lt;");
                const safeContent = post.content.replace(/</g, "&lt;");
                
                return `
                    <article class="post-card">
                        <div class="post-header">
                            <span class="post-author">${safeAuthor}</span>
                            <span class="post-date">${new Date(post.created_at).toLocaleString()}</span>
                        </div>
                        <div class="post-content">${safeContent}</div>
                        <div style="display:flex; gap:10px;">
                            <button class="outline" onclick="editPost('${post.id}', \`${safeContent}\`)">수정</button>
                            <button class="outline secondary" onclick="deletePost('${post.id}')">삭제</button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // 3. 게시글 작성
        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const author = document.getElementById('author').value;
            const content = document.getElementById('content').value;

            submitBtn.disabled = true;

            const { error } = await supabase
                .from('posts')
                .insert([{ author, content }]);

            if (error) {
                alert('등록 실패: ' + error.message);
            } else {
                postForm.reset();
                await fetchPosts(); // 작성 후 즉시 새로고침
            }
            submitBtn.disabled = false;
        });

        // 4. 삭제 및 수정 함수
        async function deletePost(id) {
            if (!confirm('삭제하시겠습니까?')) return;
            const { error } = await supabase.from('posts').delete().eq('id', id);
            if (error) alert(error.message);
            else fetchPosts();
        }

        async function editPost(id, oldContent) {
            const newContent = prompt('수정할 내용:', oldContent);
            if (!newContent || newContent === oldContent) return;
            const { error } = await supabase.from('posts').update({ content: newContent }).eq('id', id);
            if (error) alert(error.message);
            else fetchPosts();
        }

        // 초기 실행
        fetchPosts();

</script>
</body>
</html>
