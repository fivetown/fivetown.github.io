        const SUPABASE_URL = 'https://celuomuboxcwkqjawnzk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlbHVvbXVib3hjd2txamF3bnprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjg4MDksImV4cCI6MjA4ODg0NDgwOX0.bBtFB5wk8JsE5cgBno7PfJeZHHvhP3XFXkSKM7r7SZw';

        // Supabase 클라이언트 초기화
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const postForm = document.getElementById('post-form');
        const postList = document.getElementById('post-list');

        // 1. 페이지 로드 시 게시글 불러오기
        document.addEventListener('DOMContentLoaded', fetchPosts);

        // 2. 글쓰기 기능
        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const author = document.getElementById('post-author').value;
            const content = document.getElementById('post-content').value;

            // Supabase에 데이터 삽입 (Create)
            const { data, error } = await supabase
                .from('posts')
                .insert([{ author, content }]);

            if (error) {
                alert('글 작성 실패: ' + error.message);
            } else {
                postForm.reset(); // 입력창 비우기
                fetchPosts(); // 목록 새로고침
            }
        });

        // 3. Supabase에서 데이터 불러오기 (Read)
        async function fetchPosts() {
            const { data: posts, error } = await supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error fetching posts:', error);
                postList.innerHTML = '<p>게시글을 불러오는데 실패했습니다.</p>';
                return;
            }

            renderPosts(posts);
        }

        // 4. 화면에 게시글 표시 및 CRUD 버튼 연결
        function renderPosts(posts) {
            postList.innerHTML = posts.map((post, index) => `
                <article class="post-card">
                    <div class="post-header">
                        <span class="post-author">👤 ${post.author}</span>
                        <span class="post-date">${new Date(post.created_at).toLocaleString()}</span>
                    </div>
                    <div class="post-content" id="content-${post.id}">${post.content}</div>
                    <div class="post-actions">
                        <button class="outline" onclick="editPost(${post.id}, '${post.content.replace(/'/g, "\\'")}')">수정</button>
                        <button class="outline secondary" onclick="deletePost(${post.id})">삭제</button>
                    </div>
                </article>
            `).join('');
            
            if(posts.length === 0) {
                postList.innerHTML = '<p style="text-align:center; color:#999;">작성된 게시글이 없습니다.</p>';
            }
        }

        // 5. 게시글 삭제 (Delete)
        window.deletePost = async function(id) {
            if (!confirm('정말 삭제하시겠습니까?')) return;

            const { error } = await supabase
                .from('posts')
                .delete()
                .eq('id', id);

            if (error) alert('삭제 실패: ' + error.message);
            else fetchPosts();
        }

        // 6. 게시글 수정 (Update)
        window.editPost = async function(id, oldContent) {
            const newContent = prompt('수정할 내용을 입력하세요:', oldContent);
            if (newContent === null || newContent === oldContent) return;

            const { error } = await supabase
                .from('posts')
                .update({ content: newContent })
                .eq('id', id);

            if (error) alert('수정 실패: ' + error.message);
            else fetchPosts();
        }
    </script>
