<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자유 게시판</title>
    <!-- 디자인을 위한 Pico CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <!-- Supabase 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1095c1; }
        .board-container { max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .post-card { padding: 1.5rem; margin-bottom: 1.5rem; border-radius: 12px; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; transition: transform 0.2s; }
        .post-card:hover { transform: translateY(-2px); }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; border-bottom: 1px solid #f8f8f8; padding-bottom: 0.5rem; }
        .post-author { font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 5px; }
        .post-date { font-size: 0.75rem; color: #aaa; }
        .post-content { white-space: pre-wrap; margin: 15px 0; line-height: 1.6; color: #444; }
        .btn-group { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-group button { width: auto; padding: 5px 15px; font-size: 0.8rem; margin-bottom: 0; }
        #write-section { background: #f9f9f9; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; }
        #post-form textarea { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <main class="container board-container">
        <nav>
            <ul><li><a href="index.html" class="secondary">⬅️ 메인으로 돌아가기</a></li></ul>
        </nav>
        
        <header>
            <h1 style="margin-bottom: 0.5rem;">📋 자유 게시판</h1>
            <p>누구나 자유롭게 의견을 나누는 공간입니다.</p>
        </header>

        <!-- 게시글 작성 구역 -->
        <section id="write-section">
            <form id="post-form">
                <div class="grid">
                    <input type="text" id="author" placeholder="작성자 성함" required>
                    <span></span>
                </div>
                <textarea id="content" placeholder="여기에 내용을 입력하세요..." rows="3" required></textarea>
                <button type="submit" id="submit-btn">게시글 등록하기</button>
            </form>
        </section>

        <hr>

        <!-- 게시글 목록 구역 -->
        <div id="post-list">
            <p aria-busy="true" style="text-align: center;">데이터를 불러오는 중...</p>
        </div>
    </main>

    <script>
        /**
         * [필독] Supabase 설정
         * 아래 정보는 본인의 Supabase 프로젝트 Dashboard -> Settings -> API에서 확인 가능합니다.
         */
        const SUPABASE_URL = 'https://celuomuboxcwkqjawnzk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlbHVvbXVib3hjd2txamF3bnprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjg4MDksImV4cCI6MjA4ODg0NDgwOX0.bBtFB5wk8JsE5cgBno7PfJeZHHvhP3XFXkSKM7r7SZw';
        
        // 라이브러리 충돌 방지를 위해 변수명 앞에 _ 사용
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const postForm = document.getElementById('post-form');
        const postList = document.getElementById('post-list');

        // 1. 게시글 가져오기 함수
        async function fetchPosts() {
            try {
                const { data, error } = await _supabase
                    .from('posts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                renderPosts(data);
            } catch (err) {
                console.error("데이터 로드 에러:", err);
                postList.innerHTML = `
                    <article style="border: 2px solid #e53935;">
                        <h4 style="color:#e53935;">데이터를 불러오지 못했습니다</h4>
                        <p>${err.message}</p>
                        <ul style="font-size: 0.85rem;">
                            <li>Supabase에 <b>posts</b> 테이블이 생성되었는지 확인하세요.</li>
                            <li>테이블의 <b>RLS(정책)</b>가 활성화되어 있는지 확인하세요.</li>
                        </ul>
                    </article>
                `;
            }
        }

        // 2. 게시글 화면 렌더링 함수
        function renderPosts(posts) {
            if (!posts || posts.length === 0) {
                postList.innerHTML = '<p style="text-align:center; padding:3rem; color:#999;">작성된 게시글이 없습니다. 첫 글을 남겨보세요! ✨</p>';
                return;
            }

            postList.innerHTML = posts.map(post => {
                // XSS 보안 처리 (HTML 태그 무효화)
                const safeAuthor = String(post.author || '익명').replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const safeContent = String(post.content || '').replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const date = new Date(post.created_at).toLocaleString('ko-KR');

                // 템플릿 리터럴 내부에서 사용할 수 있도록 특수 기호 이스케이프
                const jsSafeContent = safeContent.replace(/`/g, '\\`').replace(/\$/g, '\\$');

                return `
                    <article class="post-card">
                        <div class="post-header">
                            <span class="post-author">👤 ${safeAuthor}</span>
                            <span class="post-date">${date}</span>
                        </div>
                        <div class="post-content">${safeContent}</div>
                        <div class="btn-group">
                            <button class="outline" onclick="editPost(${post.id}, \`${jsSafeContent}\`)">수정</button>
                            <button class="outline secondary" onclick="deletePost(${post.id})">삭제</button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // 3. 게시글 작성 이벤트
        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const author = document.getElementById('author').value.trim();
            const content = document.getElementById('content').value.trim();

            if(!author || !content) return;

            btn.disabled = true;
            btn.innerText = "등록 중...";

            try {
                const { error } = await _supabase
                    .from('posts')
                    .insert([{ author, content }]);

                if (error) throw error;
                
                postForm.reset();
                await fetchPosts(); // 즉시 새로고침
            } catch (err) {
                alert("등록 중 오류가 발생했습니다: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "게시글 등록하기";
            }
        });

        // 4. 게시글 수정 기능 (전역 등록)
        window.editPost = async function(id, oldContent) {
            const newContent = prompt("수정할 내용을 입력하세요:", oldContent);
            if (newContent === null || newContent.trim() === oldContent) return;

            try {
                const { error } = await _supabase
                    .from('posts')
                    .update({ content: newContent.trim() })
                    .eq('id', id);

                if (error) throw error;
                await fetchPosts();
            } catch (err) {
                alert("수정 실패: " + err.message);
            }
        };

        // 5. 게시글 삭제 기능 (전역 등록)
        window.deletePost = async function(id) {
            if (!confirm("정말 이 게시글을 삭제하시겠습니까?")) return;

            try {
                const { error } = await _supabase
                    .from('posts')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                await fetchPosts();
            } catch (err) {
                alert("삭제 실패: " + err.message);
            }
        };

        // 페이지 로드 시 실행
        fetchPosts();
    </script>
</body>
</html>
