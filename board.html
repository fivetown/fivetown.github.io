<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        .board-container { max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .post-card { 
            padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e1e4e8; border-radius: 8px; 
            background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
        .post-author { font-weight: bold; color: #333; }
        .post-date { font-size: 0.85rem; color: #888; }
        .post-content { white-space: pre-wrap; margin-top: 10px; }
        .nav-link { margin-bottom: 1.5rem; display: inline-block; }
        .post-actions { margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: flex-end; }
        .post-actions button { width: auto; font-size: 0.8rem; padding: 0.2rem 0.8rem; margin-bottom: 0; }
    </style>
    <!-- Supabase JS 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <main class="container board-container">
        <a href="index.html" class="nav-link">⬅️ 메인으로 돌아가기</a>
        
        <header>
            <h1>📋 게시판</h1>
            <p>Supabase 연동 게시판</p>
        </header>

        <section>
            <form id="post-form">
                <div class="grid">
                    <input type="text" id="post-author" placeholder="작성자 이름" required style="margin-bottom: 1rem;">
                </div>
                <textarea id="post-content" placeholder="무슨 생각을 하고 계신가요?" required style="min-height: 100px; margin-bottom: 1rem;"></textarea>
                <button type="submit">글쓰기</button>
            </form>
        </section>

        <section id="post-list">
            <!-- 게시글이 여기에 표시됩니다 -->
        </section>
    </main>

    <script>
        // Supabase 설정
        const SUPABASE_URL = 'https://celuomuboxcwkqjawnzk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlbHVvbXVib3hjd2txamF3bnprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjg4MDksImV4cCI6MjA4ODg0NDgwOX0.bBtFB5wk8JsE5cgBno7PfJeZHHvhP3XFXkSKM7r7SZw';

        // Supabase 클라이언트 초기화
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const postForm = document.getElementById('post-form');
        const postList = document.getElementById('post-list');

        // 1. 페이지 로드 시 게시글 불러오기
        document.addEventListener('DOMContentLoaded', fetchPosts);

        // 2. 글쓰기 기능
        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const author = document.getElementById('post-author').value;
            const content = document.getElementById('post-content').value;

            const { data, error } = await supabase
                .from('posts')
                .insert([{ author, content }]);

            if (error) {
                alert('글 작성 실패: ' + error.message);
            } else {
                postForm.reset();
                fetchPosts();
            }
        });

        // 3. Supabase에서 데이터 불러오기
        async function fetchPosts() {
            const { data: posts, error } = await supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error fetching posts:', error);
                postList.innerHTML = '<p>게시글을 불러오는데 실패했습니다.</p>';
                return;
            }
            renderPosts(posts);
        }

        // 4. 화면 표시
        function renderPosts(posts) {
            postList.innerHTML = posts.map((post) => `
                <article class="post-card">
                    <div class="post-header">
                        <span class="post-author">👤 ${post.author}</span>
                        <span class="post-date">${new Date(post.created_at).toLocaleString()}</span>
                    </div>
                    <div class="post-content">${post.content}</div>
                </article>
            `).join('');
            
            if(posts.length === 0) postList.innerHTML = '<p style="text-align:center; color:#999;">작성된 게시글이 없습니다.</p>';
        }
    </script>
</body>
</html>
