<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Hub | Fivetown</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1e293b;
            margin: 0;
            padding: 0;
        }

        /* Hero Section */
        .hero {
            background: var(--bg-gradient);
            color: white;
            padding: 5rem 1rem;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
            margin-bottom: -3rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 1rem;
            color: white;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.25rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        /* Input Section (CTA) */
        .input-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1.5rem;
            position: relative;
            z-index: 10;
        }

        .input-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .input-card h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #1e293b;
        }

        textarea {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.3s ease;
            font-size: 1rem;
            margin-bottom: 1rem;
            width: 100%;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        input[type="text"] {
            border-radius: 10px;
            margin-bottom: 1rem;
            width: 100%;
        }

        #submit-btn {
            background-color: var(--primary);
            border: none;
            padding: 1rem 2rem;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
            margin-top: 1rem;
            width: 100%;
            color: white;
            cursor: pointer;
        }

        #submit-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4);
        }

        /* Feed Section */
        .feed-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 1.5rem;
        }

        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .post-card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease backwards;
        }

        .post-card:hover {
            transform: scale(1.01);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-weight: bold;
            color: var(--primary);
        }

        .post-meta {
            flex-grow: 1;
        }

        .post-author {
            font-weight: 700;
            color: #1e293b;
            display: block;
        }

        .post-date {
            font-size: 0.8rem;
            color: #64748b;
        }

        .post-content {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #334155;
            white-space: pre-wrap;
        }

        .post-actions {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            border-top: 1px solid #f1f5f9;
            padding-top: 1rem;
        }

        .btn-icon {
            padding: 5px 15px;
            font-size: 0.8rem;
            border-radius: 8px;
            width: auto;
            margin-bottom: 0;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        nav.container-fluid {
            padding: 1rem 2rem;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
    </style>
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong>Fivetown Hub</strong></li>
        </ul>
        <ul>
            <li><a href="index.html" class="secondary">Home</a></li>
            <li><a href="https://github.com/fivetown" target="_blank" role="button" class="outline">GitHub</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>당신의 목소리를 들려주세요</h1>
            <p>Fivetown 커뮤니티는 누구나 자유롭게 의견을 나누는 열린 공간입니다. 오늘 어떤 일이 있으셨나요?</p>
        </div>
    </header>

    <div class="input-container">
        <section class="input-card">
            <h2 style="color: #1e293b;">✨ 새로운 소식 전하기</h2>
            <form id="post-form">
                <input type="text" id="author" placeholder="당신의 이름은 무엇인가요?" required>
                <textarea id="content" placeholder="이곳에 당신의 생각을 자유롭게 적어보세요..." rows="4" required></textarea>
                <button type="submit" id="submit-btn">커뮤니티에 공유하기</button>
            </form>
        </section>
    </div>

    <main class="feed-container">
        <div class="feed-header">
            <h3>최근 게시물</h3>
            <mark id="post-count">0 posts</mark>
        </div>
        <div id="post-list">
            <p aria-busy="true" style="text-align: center;">소식을 불러오는 중입니다...</p>
        </div>
    </main>

    <footer class="container" style="text-align: center; padding: 4rem 0; color: #64748b;">
        <small>© 2026 Fivetown Space. Built with Gemini CLI & Supabase.</small>
    </footer>

    <script>
        const SUPABASE_URL = 'https://celuomuboxcwkqjawnzk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlbHVvbXVib3hjd2txamF3bnprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjg4MDksImV4cCI6MjA4ODg0NDgwOX0.bBtFB5wk8JsE5cgBno7PfJeZHHvhP3XFXkSKM7r7SZw';
        
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const postForm = document.getElementById('post-form');
        const postList = document.getElementById('post-list');

        async function fetchPosts() {
            try {
                const { data, error } = await _supabase
                    .from('posts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                document.getElementById('post-count').innerText = `${data.length} posts`;
                renderPosts(data);
            } catch (err) {
                postList.innerHTML = `<article class="post-card" style="border-left: 5px solid #ef4444;"><h4>오류가 발생했습니다</h4><p>${err.message}</p></article>`;
            }
        }

        function renderPosts(posts) {
            if (!posts || posts.length === 0) {
                postList.innerHTML = '<div class="post-card" style="text-align:center; color:#64748b; padding: 3rem;">아직 게시물이 없습니다. 첫 소식을 남겨보세요!</div>';
                return;
            }

            postList.innerHTML = posts.map((post, index) => {
                const safeAuthor = String(post.author || '익명').replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const safeContent = String(post.content || '').replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const date = new Date(post.created_at).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                const initial = safeAuthor.charAt(0).toUpperCase();

                return `
                    <article class="post-card" style="animation-delay: ${index * 0.1}s">
                        <div class="post-header">
                            <div class="avatar">${initial}</div>
                            <div class="post-meta">
                                <span class="post-author">${safeAuthor}</span>
                                <span class="post-date">${date}</span>
                            </div>
                        </div>
                        <div class="post-content">${safeContent}</div>
                        <div class="post-actions">
                            <button class="outline secondary btn-icon" onclick="deletePost(${post.id})">삭제</button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const author = document.getElementById('author').value.trim();
            const content = document.getElementById('content').value.trim();

            if(!author || !content) return;

            btn.disabled = true;
            btn.innerText = "공유 중...";

            try {
                const { error } = await _supabase.from('posts').insert([{ author, content }]);
                if (error) throw error;
                postForm.reset();
                await fetchPosts();
            } catch (err) {
                alert("등록 중 오류가 발생했습니다: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "커뮤니티에 공유하기";
            }
        });

        window.deletePost = async function(id) {
            if (!confirm("정말 이 소식을 삭제하시겠습니까?")) return;
            try {
                const { error } = await _supabase.from('posts').delete().eq('id', id);
                if (error) throw error;
                await fetchPosts();
            } catch (err) {
                alert("삭제 실패: " + err.message);
            }
        };

        fetchPosts();
    </script>
</body>
</html>
