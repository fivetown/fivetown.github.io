<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .board-container { max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .post-card { padding: 1.5rem; margin-bottom: 1rem; border-radius: 8px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; border-bottom: 1px solid #f0f0f0; padding-bottom: 0.5rem; }
        .post-author { font-weight: bold; }
        .post-date { font-size: 0.8rem; color: #888; }
        .post-content { white-space: pre-wrap; margin: 10px 0; }
    </style>
</head>
<body>
    <main class="container board-container">
        <a href="index.html">⬅️ 메인으로 돌아가기</a>
        <header>
            <h1>📋 자유 게시판</h1>
        </header>

        <section id="write-section">
            <form id="post-form">
                <input type="text" id="author" placeholder="작성자 이름" required>
                <textarea id="content" placeholder="내용을 입력하세요" rows="3" required></textarea>
                <button type="submit" id="submit-btn">게시글 등록</button>
            </form>
        </section>

        <hr>
        <div id="post-list">
            <p aria-busy="true">데이터를 불러오는 중...</p>
        </div>
    </main>

    <script>
        // Supabase 설정 (본인의 정보로 유지)
        const SUPABASE_URL = 'https://celuomuboxcwkqjawnzk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlbHVvbXVib3hjd2txamF3bnprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjg4MDksImV4cCI6MjA4ODg0NDgwOX0.bBtFB5wk8JsE5cgBno7PfJeZHHvhP3XFXkSKM7r7SZw';
        
        // Supabase 클라이언트 초기화 체크
        let supabaseClient;
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Supabase 초기화 실패:", e);
        }

        const postForm = document.getElementById('post-form');
        const postList = document.getElementById('post-list');

        // 1. 게시글 가져오기
        async function fetchPosts() {
            try {
                if (!supabaseClient) throw new Error("Supabase 클라이언트가 설정되지 않았습니다.");
                
                const { data, error } = await supabaseClient
                    .from('posts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error("Supabase 상세 에러:", error);
                    throw new Error(`${error.message} (힌트: ${error.hint || '없음'}, 상세: ${error.details || '없음'})`);
                }
                displayPosts(data);
            } catch (error) {
                console.error("전체 에러 정보:", error);
                postList.innerHTML = `
                    <div style="color:red; padding: 1rem; border: 1px solid red; border-radius: 8px;">
                        <strong>데이터 로드 실패</strong><br>
                        <small>${error.message}</small>
                        <br><br>
                        <p style="font-size: 0.8rem; color: #555;">
                            ※ 테이블 이름이 'posts'가 맞는지, 혹은 'created_at' 컬럼이 있는지 확인해주세요.
                        </p>
                    </div>
                `;
            }
        }

        // 2. 화면에 표시 (보안 및 예외 처리 강화)
        function displayPosts(posts) {
            if (!posts || posts.length === 0) {
                postList.innerHTML = '<p>등록된 게시글이 없습니다.</p>';
                return;
            }

            postList.innerHTML = posts.map(post => {
                // 데이터 유효성 검사 및 기본값 설정
                const author = post.author || '익명';
                const content = post.content || '(내용 없음)';
                const date = post.created_at ? new Date(post.created_at).toLocaleString() : '날짜 알 수 없음';
                
                // XSS 방지를 위한 치환 (안전하게 처리)
                const safeAuthor = String(author).replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const safeContent = String(content).replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
                // 수정 시 백틱(`)과 달러($) 기호가 템플릿 리터럴을 깨뜨리지 않도록 이스케이프
                const jsSafeContent = safeContent.replace(/`/g, '\\`').replace(/\$/g, '\\$');
                
                return `
                    <article class="post-card">
                        <div class="post-header">
                            <span class="post-author">${safeAuthor}</span>
                            <span class="post-date">${date}</span>
                        </div>
                        <div class="post-content">${safeContent}</div>
                        <div style="display:flex; gap:10px;">
                            <button class="outline" onclick="editPost('${post.id}', \`${jsSafeContent}\`)">수정</button>
                            <button class="outline secondary" onclick="deletePost('${post.id}')">삭제</button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // 3. 게시글 작성
        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const author = document.getElementById('author').value;
            const content = document.getElementById('content').value;

            if (!author.trim() || !content.trim()) {
                alert('이름과 내용을 모두 입력해주세요.');
                return;
            }

            submitBtn.disabled = true;

            try {
                const { error } = await supabaseClient
                    .from('posts')
                    .insert([{ author, content }]);

                if (error) throw error;
                
                postForm.reset();
                await fetchPosts(); // 작성 후 즉시 새로고침
            } catch (error) {
                alert('등록 실패: ' + error.message);
            } finally {
                submitBtn.disabled = false;
            }
        });

        // 4. 삭제 및 수정 함수
        window.deletePost = async function(id) {
            if (!confirm('삭제하시겠습니까?')) return;
            try {
                const { error } = await supabaseClient.from('posts').delete().eq('id', id);
                if (error) throw error;
                fetchPosts();
            } catch (error) {
                alert('삭제 실패: ' + error.message);
            }
        }

        window.editPost = async function(id, oldContent) {
            const newContent = prompt('수정할 내용:', oldContent);
            if (newContent === null || newContent === oldContent) return;
            
            try {
                const { error } = await supabaseClient.from('posts').update({ content: newContent }).eq('id', id);
                if (error) throw error;
                fetchPosts();
            } catch (error) {
                alert('수정 실패: ' + error.message);
            }
        }

        // 초기 실행
        fetchPosts();
    </script>
</body>
</html>
